<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Image Gallery</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <header>

        <h1>Responsive Image Gallery</h1>

        <p>Explore beautiful images with lightbox and filters.</p>

    </header>

    <!-- Filter Buttons -->

    <div class="filter-buttons">

        <button class="filter-btn active" data-filter="all">All</button>

        <button class="filter-btn" data-filter="nature">Nature</button>

        <button class="filter-btn" data-filter="city">City</button>

        <button class="filter-btn" data-filter="animals">Animals</button>

    </div>

    <!-- Gallery -->

    <section class="gallery">

    <div class="gallery-item nature">
        <img src="assets/images/download.jpg" alt="Nature Image">
    </div>

    <div class="gallery-item city">
        <img src="assets/images/download.png" alt="City Image">
    </div>

    <div class="gallery-item animals">
        <img src="assets/images/download (1).jpg" alt="Animal Image">
    </div>

</section>

    <!-- Lightbox -->

    <div class="lightbox" id="lightbox">

        <span class="close">&times;</span>

        <button class="prev">&#10094;</button>

        <img class="lightbox-image" id="lightboxImage" src="" alt="Preview">

        <button class="next">&#10095;</button>

    </div>

    <script src="script.js"></script>

</body>
</html>
